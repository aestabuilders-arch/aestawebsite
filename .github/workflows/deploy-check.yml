name: Post-Deploy Smoke Check

on:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Vercel deploy
        # Vercel auto-deploys on the same push. Give it a head start before polling.
        run: sleep 90

      - name: Smoke test homepage
        run: |
          attempts=0
          max=10
          until curl -fsSL https://aesta.co.in/ | grep -qi 'AESTA'; do
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max" ]; then
              echo "::error::Homepage smoke failed after $max attempts"
              exit 1
            fi
            echo "Attempt $attempts: not ready, retrying in 30s"
            sleep 30
          done
          echo "Homepage OK"

      - name: Smoke test about page
        run: |
          if ! curl -fsSL https://aesta.co.in/about | grep -qi 'AESTA'; then
            echo "::error::About page smoke failed"
            exit 1
          fi
          echo "About page OK"

      - name: Smoke test sitemap is valid XML with clean URLs
        # Guards against the trailing-newline env-var bug that produced
        # malformed <loc> URLs and a "Sitemap could not be read" in GSC.
        run: |
          url="https://aesta.co.in/sitemap.xml"
          ctype=$(curl -fsSL -o /tmp/sitemap.xml -w '%{content_type}' "$url")
          echo "Content-Type: $ctype"
          case "$ctype" in
            *xml*) : ;;
            *) echo "::error::sitemap Content-Type is '$ctype', expected application/xml"; exit 1 ;;
          esac
          python3 - <<'PY'
          import xml.dom.minidom as m
          d = m.parse('/tmp/sitemap.xml')
          urls = d.getElementsByTagName('url')
          locs = [u.getElementsByTagName('loc')[0].firstChild.data for u in urls]
          bad = [l for l in locs if l != l.strip() or any(c in l for c in '\n\r\t ')]
          assert len(urls) >= 50, f"sitemap has only {len(urls)} urls -- stale/empty build?"
          assert not bad, f"malformed <loc> (whitespace/newline): {bad[:5]}"
          print(f"sitemap OK -- {len(urls)} urls, all <loc> clean")
          PY
          if ! curl -fsSL https://aesta.co.in/robots.txt | grep -qx 'Sitemap: https://aesta.co.in/sitemap.xml'; then
            echo "::error::robots.txt Sitemap line missing or malformed"
            exit 1
          fi
          echo "Sitemap smoke OK"
